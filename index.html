<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>MIDI WebSocket Sender</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: Inter, Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        color: #111;
        padding: 24px;
      }

      .container {
        width: 100%;
        max-width: 520px;
        border: 1px solid #ddd;
        border-radius: 14px;
        padding: 28px;
      }

      h2 {
        margin: 0 0 24px;
        font-size: 1.4rem;
        font-weight: 600;
        line-height: 1.4;
      }

      .section {
        margin-bottom: 18px;
      }

      input[type="file"] {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 10px;
        background: transparent;
        font-size: 0.95rem;
      }

      .buttons {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        border: 1px solid #bbb;
        background: transparent;
        padding: 12px 18px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 0.95rem;
        transition: 0.15s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(0);
      }

      #status {
        margin-top: 22px;
        padding-top: 16px;
        border-top: 1px solid #e5e5e5;
        font-size: 0.95rem;
      }

      .status-label {
        font-weight: 600;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>
        Select a MIDI file and send it through WebSocket for the Laby.net Server
      </h2>

      <div class="section">
        <input type="file" id="midiFile" accept=".mid,.midi" />
      </div>

      <div class="buttons">
        <button onclick="connectWS()">Connect WS</button>
        <button onclick="sendMidi()">Send MIDI</button>
      </div>

      <p id="status"><span class="status-label">Status:</span> Disconnected</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.28/build/Midi.js"></script>

    <script>
      let ws;
      let midiData;

      const WS_URL = "wss://piano.laby.net/piano";

      function setStatus(text) {
        document.getElementById("status").innerHTML =
          `<span class="status-label">Status:</span> ${text}`;
      }

      function connectWS() {
        ws = new WebSocket(WS_URL);

        ws.onopen = () => {
          setStatus("Connected");
        };

        ws.onclose = () => {
          setStatus("Disconnected");
        };

        ws.onerror = (err) => {
          console.log("WS error", err);
        };
      }

      document
        .getElementById("midiFile")
        .addEventListener("change", async (e) => {
          const file = e.target.files[0];

          if (!file) return;

          const arrayBuffer = await file.arrayBuffer();

          midiData = new Midi(arrayBuffer);

          console.log("MIDI loaded:", midiData);

          alert("MIDI loaded!");
        });

      function sendMidi() {
        if (!ws || ws.readyState !== 1) {
          alert("WebSocket not connected");
          return;
        }

        if (!midiData) {
          alert("Load a MIDI file first");
          return;
        }

        const events = [];

        midiData.tracks.forEach((track) => {
          track.notes.forEach((note) => {
            events.push({
              time: note.time,
              duration: note.duration,
              midi: note.midi,
              velocity: note.velocity,
            });
          });
        });

        events.sort((a, b) => a.time - b.time);

        events.forEach((event) => {
          const delay = event.time * 1000;

          setTimeout(() => {
            const payload = {
              type: "note",
              note: event.midi,
              velocity: Math.floor(event.velocity * 127),
              duration: event.duration,
            };

            ws.send(JSON.stringify(payload));

            console.log("Sent:", payload);
          }, delay);
        });
      }
    </script>
  </body>
</html>
